<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A1614">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eigenwerk">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
<title>Eigenwerk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#1A1614;--card:#F7F5F3;--bdr:#DDD6CC;--txt:#F0EBE3;--mut:#9A8E86;--lit:#252220;--nh:64px;--hh:56px;--blue:#E8603A;--bbl:#FCDDD5;--grn:#22C55E;--gbl:#DCFCE7;--amb:#EF9F27;--abl:#FEF3C7;--red:#EF4444;--rbl:#FEE2E2;--aka:#065F46;--akl:#ECFDF5;--rust:#E8603A;--cream:#F0EBE3;--dark:#1A1614;}
/* Karten: helles Beige mit dunklem Text */
.card,.sc,.ww,.impuls-card,.kumpel-note,.kumpel-ai-response,.sheet,.pin-scr{color:#2A2218!important;}
.card .tn,.card .ct,.sc .sn,.sc .sl,.ww .wl,.wh,.blk-n,.blk-l,.sht,.shd,.fld label,.seg-b,.mbtn,.kumpel-note-text,.kumpel-ai-text,.kumpel-ai-label{color:#2A2218!important;}
.card .tarr,.card .tm,.blk-t,.blk-n.empty,.wd-l,.wd-h,.impuls-sub,.kumpel-note-meta,.kumpel-sub,.str-l{color:#7A6E66!important;}
.fld input,.fld select,.qa input,.sw input,.kumpel-input{background:#EEECEA!important;color:#2A2218!important;border-color:#D8D4D0!important;}
.fld input::placeholder,.qa input::placeholder,.sw input::placeholder,.kumpel-input::placeholder{color:#9A9590!important;}
.mbtn{background:#EEECEA!important;border-color:#D8D4D0!important;}
.mbtn.on{color:white!important;}
.seg{background:#EEECEA!important;}
.seg-b.on{background:var(--rust)!important;color:white!important;box-shadow:0 2px 8px rgba(232,96,58,.35)!important;}
.pill{color:#2A2218!important;}
.pp{background:#ECFDF5!important;}.pj{background:#FDF2F8!important;}.pl{background:#F5F3FF!important;}.pli{background:#FFF7ED!important;}.pr{background:#FEE2E2!important;}.pt{background:#E5DDD4!important;}.pok{background:#DCFCE7!important;}
.sb{color:#2A2218!important;}.so{background:#E5DDD4!important;}.sz{background:#DBEAFE!important;}.st{background:#FEF3C7!important;}.se{background:#DCFCE7!important;}
.fc{background:var(--card)!important;color:#2A2218!important;border-color:#C8BFB4!important;}
.fc.on{background:var(--rust)!important;border-color:var(--rust)!important;color:white!important;}
.pin-k{background:#E5DDD4!important;color:#2A2218!important;border-color:#C8BFB4!important;}
.pin-k:active{background:#DDD5CB!important;}
/* Header & Nav: Anthrazit mit Glaseffekt */
.hdr{background:rgba(26,22,20,.95)!important;backdrop-filter:blur(12px);border-bottom-color:rgba(240,235,227,.1)!important;}
.nav{background:rgba(26,22,20,.95)!important;backdrop-filter:blur(12px);border-top-color:rgba(240,235,227,.1)!important;}
.ni{color:#9A8E86!important;}.ni.on{color:var(--rust)!important;}
/* Karten Schatten & Rand */
.card,.sc,.ww,.impuls-card,.kumpel-note{box-shadow:0 2px 12px rgba(0,0,0,.22);}
.card{margin-bottom:16px!important;}
/* Mehr Luft in Karten */
.tr{padding:16px 18px!important;}
.ct{padding:14px 18px 8px!important;font-size:12px!important;}
/* Wochenbalken auf hellen Karten */
.wd-bg{background:#E8E5E2!important;}
.wd-b{background:var(--rust)!important;}
/* Progress bar Hintergrund */
.pb{background:#E0D8CE!important;}
/* Stat-Karten — gleicher Ton, farbige linke Linie */
.sg{gap:10px!important;margin-bottom:16px!important;}
.sc{padding:16px 16px 16px 18px!important;border-radius:14px!important;background:#F7F5F3!important;border-left:4px solid #D1CCC7!important;border-top:none!important;border-right:none!important;border-bottom:none!important;box-shadow:0 2px 10px rgba(0,0,0,.15)!important;}
.sc:nth-child(1){border-left-color:#9CA3AF!important;}
.sc:nth-child(2){border-left-color:#E8603A!important;}
.sc:nth-child(3){border-left-color:#D97706!important;}
.sc:nth-child(4){border-left-color:#16A34A!important;}
/* Stat-Zahlen Farben */
.sc:nth-child(1) .sn{color:#6B7280!important;}
.sc:nth-child(2) .sn{color:#E8603A!important;}
.sc:nth-child(3) .sn{color:#D97706!important;}
.sc:nth-child(4) .sn{color:#16A34A!important;}
/* Task-Punkte sichtbar */
.do{background:#9CA3AF!important;width:12px!important;height:12px!important;}
.dz{background:#E8603A!important;width:12px!important;height:12px!important;}
.dt{background:#D97706!important;width:12px!important;height:12px!important;}
.de{background:#16A34A!important;width:12px!important;height:12px!important;}
/* Mehr Luft zwischen Abschnitten */
.ww{padding:16px 18px!important;margin-bottom:14px!important;}
.sg .sc{margin-bottom:0!important;}
/* Streak-Box */
.streak-box{background:linear-gradient(135deg,#E8603A,#FBBF24)!important;color:white!important;}
.streak-box .str-n,.streak-box .str-l{color:white!important;}
/* Direkte Hintergrundtexte (Grüße, Abschnitte) bleiben hell */
.hdr-t{color:var(--cream)!important;font-family:'Playfair Display',serif!important;}
.hdr-b{background:rgba(240,235,227,.12)!important;color:var(--cream)!important;}
/* Kumpel AI */
.kumpel-ai-response{background:#F5EFE6!important;border-color:var(--rust)!important;}
.kumpel-input{background:#E5DDD4!important;}
.kumpel-send{background:var(--rust)!important;}
.kumpel-action-btn{background:#E5DDD4!important;color:#2A2218!important;border-color:#C8BFB4!important;}
/* Fab */
.fab{background:var(--rust)!important;box-shadow:0 4px 14px rgba(232,96,58,.4)!important;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);}
.hdr-t{font-family:'Playfair Display',serif!important;}
/* ── IMPULS CARD ── */
.impuls-card{background:var(--card);border-left:4px solid var(--rust);border-radius:14px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.impuls-quote{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;line-height:1.6;color:#2A2218;flex:1;}
.impuls-sub{font-size:11px;color:var(--mut);margin-top:4px;font-style:italic;}
.breath-btn-sm{position:relative;flex-shrink:0;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px 8px;}
.breath-btn-circle{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#E8603A,#FBBF24);box-shadow:0 4px 16px rgba(232,96,58,.45);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;}
.breath-btn-circle::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:1.5px solid rgba(232,96,58,.4);animation:breath-pulse 2.5s ease-in-out infinite;}
.breath-btn-circle::after{content:'';position:absolute;inset:-11px;border-radius:50%;border:1px solid rgba(232,96,58,.18);animation:breath-pulse 2.5s ease-in-out infinite .4s;}
@keyframes breath-pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.12);opacity:.6;}}
.breath-btn-label{display:none;}
/* ── BREATH OVERLAY ── */
.breath-ov{display:none;position:fixed;inset:0;background:rgba(8,10,18,.97);z-index:400;flex-direction:column;align-items:center;justify-content:center;gap:32px;}
.breath-ov.on{display:flex;}
.breath-title{font-family:'Playfair Display',serif;font-size:24px;color:#E8EDF8;letter-spacing:.02em;}
.breath-phase{font-size:13px;font-weight:600;color:#7A8AAF;letter-spacing:.15em;text-transform:uppercase;height:20px;}
.breath-svg-wrap{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;}
.breath-svg{position:absolute;top:0;left:0;width:100%;height:100%;transition:transform 4s cubic-bezier(.4,0,.2,1);}
.breath-svg.expanding{transform:scale(1.35);}
.breath-svg.holding{transform:scale(1.35);}
.breath-svg.shrinking{transform:scale(1);}
.breath-glow{position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(232,96,58,.25) 0%,transparent 70%);transition:opacity 4s ease;pointer-events:none;}
.breath-count{position:absolute;font-size:48px;font-weight:300;color:#E8EDF8;letter-spacing:-2px;font-family:'DM Sans',sans-serif;}
.breath-close{background:none;border:1px solid rgba(255,255,255,.12);color:#7A8AAF;border-radius:10px;padding:12px 28px;cursor:pointer;font-size:14px;letter-spacing:.04em;transition:all .2s;}
.breath-close:hover{border-color:rgba(255,255,255,.3);color:#E8EDF8;}
@keyframes glow-pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
/* ── CONFETTI CANVAS ── */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;display:none;}
/* ── KI KUMPEL ── */
.kumpel-header{font-family:'Playfair Display',serif;font-size:20px;padding:14px 16px 4px;color:var(--txt);}
.kumpel-sub{font-size:12px;color:var(--mut);padding:0 16px 12px;}
.kumpel-input-wrap{display:flex;gap:8px;padding:0 0 12px;}
.kumpel-input{flex:1;padding:12px;border-radius:12px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);font-size:14px;font-family:inherit;resize:none;min-height:80px;}
.kumpel-send{padding:10px 14px;border-radius:12px;background:var(--rust);color:white;border:none;font-size:20px;cursor:pointer;align-self:flex-end;}
.kumpel-note{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--rust);}
.kumpel-note-text{font-size:14px;line-height:1.5;color:var(--txt);}
.kumpel-note-meta{font-size:11px;color:var(--mut);margin-top:6px;display:flex;justify-content:space-between;align-items:center;}
.kumpel-note-del{background:none;border:none;color:var(--mut);cursor:pointer;font-size:14px;}
.kumpel-ai-response{background:linear-gradient(135deg,#2C1F1A,#3D2A22);border:1px solid var(--rust);border-radius:12px;padding:14px;margin-bottom:8px;}
.kumpel-ai-label{font-size:10px;font-weight:700;color:var(--rust);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.kumpel-ai-text{font-size:14px;line-height:1.6;color:var(--txt);}
.kumpel-action-row{display:flex;gap:8px;margin-bottom:12px;}
.kumpel-action-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.kumpel-action-btn:active{background:var(--lit);}
.kumpel-thinking{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:13px;padding:8px 0;}
.kumpel-dot{width:6px;height:6px;border-radius:50%;background:var(--rust);animation:kbounce .8s infinite alternate;}
.kumpel-dot:nth-child(2){animation-delay:.2s;}
.kumpel-dot:nth-child(3){animation-delay:.4s;}
@keyframes kbounce{from{transform:translateY(0);}to{transform:translateY(-6px);}}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:1100px;margin:0 auto;box-shadow:0 0 80px rgba(0,0,0,.4);}
.hdr{height:var(--hh);background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.hdr-t{font-size:18px;font-weight:700;flex:1;}
.hdr-b{width:36px;height:36px;border-radius:10px;border:none;background:var(--lit);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 32px 24px;}
.nav{height:var(--nh);background:var(--card);border-top:1px solid var(--bdr);display:flex;position:sticky;bottom:0;z-index:100;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;cursor:pointer;border:none;background:none;color:var(--mut);}
.ni.on{color:var(--blue);}
.ni-i{font-size:20px;line-height:1;}.ni-l{font-size:9px;font-weight:700;}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.ct{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;padding:11px 14px 4px;}
.tr{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--lit);cursor:pointer;}
.tr:last-child{border-bottom:none;}
.tr:active{background:var(--lit);}
.tr.done{opacity:.38;}.tr.done .tn{text-decoration:line-through;}
.step-n{width:18px;height:18px;border-radius:50%;background:var(--amb);color:white;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.do{background:#9CA3AF;}.dz{background:var(--blue);}.dt{background:var(--amb);}.de{background:var(--grn);}
.tb{flex:1;min-width:0;}.tn{font-size:15px;font-weight:500;line-height:1.4;margin-bottom:4px;}
.tm{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.pp{background:#ECFDF5;color:#065F46;}.pj{background:#FDF2F8;color:#9D174D;}.pl{background:#F5F3FF;color:#4C1D95;}.pli{background:#FFF7ED;color:#92400E;}.pr{background:var(--bbl);color:var(--blue);}
.pt{background:var(--lit);color:var(--mut);}.pd{background:#FFF7ED;color:#92400E;}.pok{background:var(--gbl);color:#065F46;}
.sb{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.so{background:var(--lit);color:var(--mut);}.sz{background:#DBEAFE;color:#1E40AF;}.st{background:var(--abl);color:#92400E;}.se{background:var(--gbl);color:#065F46;}
.tarr{color:var(--mut);font-size:16px;align-self:center;}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:12px;}
.sn{font-size:22px;font-weight:700;}.sl{font-size:11px;color:var(--mut);margin-top:2px;}
.pb{height:4px;background:var(--lit);border-radius:2px;margin-bottom:14px;}
.pbar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--grn));transition:width .4s;}
.seg{display:flex;background:var(--lit);border-radius:10px;padding:3px;margin-bottom:14px;gap:3px;}
.seg-b{flex:1;padding:7px;border-radius:8px;border:none;background:none;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;}
.seg-b.on{background:var(--card);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.so-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);max-height:92vh;overflow-y:auto;width:100%;animation:su .25s ease;}
@keyframes su{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sh{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:12px auto 0;}
.shd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.sht{font-size:16px;font-weight:700;}
.shc{font-size:22px;color:var(--mut);background:none;border:none;cursor:pointer;padding:4px;}
.shb{padding:0 16px 16px;}
.fld{margin-bottom:14px;}
.fld label{font-size:12px;font-weight:600;color:var(--mut);display:block;margin-bottom:5px;}
.fld input,.fld select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:var(--bg);color:var(--txt);font-size:15px;font-family:inherit;-webkit-appearance:none;}
.mbtns{display:flex;gap:6px;flex-wrap:wrap;}
.mbtn{padding:8px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg);color:var(--mut);font-size:13px;font-weight:600;cursor:pointer;}
.mbtn.on{color:white;border-color:transparent;}
.ap.on{background:#065F46;}.aj.on{background:#9D174D;}.al.on{background:#4C1D95;}.ali.on{background:#92400E;}.ar.on{background:var(--blue);}
.mo.on{background:#6B7280;}.mz.on{background:var(--blue);}.mt.on{background:var(--amb);}.me.on{background:var(--grn);}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bf{width:100%;padding:15px;border-radius:12px;font-size:16px;font-weight:700;border:none;cursor:pointer;margin-top:4px;}
.bp{background:var(--blue);color:white;}.bd{background:var(--rbl);color:var(--red);}.bg{background:var(--lit);color:var(--txt);}
.fscr{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none;}
.fscr::-webkit-scrollbar{display:none;}
.fc{padding:6px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--card);color:var(--mut);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.fc.on{background:#111827;color:white;border-color:#111827;}
.sw{position:relative;margin-bottom:12px;}
.sw input{width:100%;padding:11px 12px 11px 38px;border-radius:12px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);font-size:15px;font-family:inherit;}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:16px;}
.qa{display:flex;gap:8px;margin-bottom:14px;}
.qa input{flex:1;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);font-size:14px;font-family:inherit;}
.qa button{padding:12px 16px;border-radius:10px;background:var(--blue);color:white;border:none;font-size:16px;font-weight:700;cursor:pointer;}
.fab{position:sticky;bottom:calc(var(--nh) + 14px);float:right;margin-right:0;margin-top:-64px;width:50px;height:50px;border-radius:50%;background:var(--blue);color:white;font-size:24px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(29,78,216,.4);display:flex;align-items:center;justify-content:center;z-index:50;}
.toast{position:fixed;bottom:calc(var(--nh) + 70px);left:50%;transform:translateX(-50%);background:#111827;color:white;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;animation:fio 2.5s ease;pointer-events:none;white-space:nowrap;}
@keyframes fio{0%{opacity:0;transform:translateX(-50%) translateY(8px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;}}
.empty{text-align:center;padding:32px 20px;color:var(--mut);}
.pj-box{border:1.5px solid var(--amb);border-radius:12px;padding:10px;margin-bottom:10px;}
.pj-hd{font-size:11px;font-weight:700;color:#B45309;margin-bottom:6px;}
.pj-flow{font-size:10px;color:#B45309;background:var(--abl);border-radius:6px;padding:5px 9px;margin-bottom:8px;line-height:1.5;}
@media(prefers-color-scheme:dark){.pj-hd{color:#FCD34D;}.pj-flow{color:#FCD34D;background:#451A03;}}
.blk{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--lit);}
.blk:last-child{border-bottom:none;}
.blk-t{font-size:11px;font-weight:600;color:var(--mut);min-width:74px;}
.blk-d{width:8px;height:8px;border-radius:50%;}
.bs{background:var(--blue);}.ba{background:var(--aka);}.bp2{background:#D1D5DB;}
.blk-b{flex:1;}
.blk-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.bl-s{color:var(--blue);}.bl-a{color:var(--aka);}.bl-p{color:var(--mut);}
.blk-n{font-size:13px;font-weight:500;}
.blk-n.empty{color:var(--mut);font-style:italic;}
.blk-btn{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:var(--blue);color:white;flex-shrink:0;}
.blk-btn.done{background:var(--gbl);color:#065F46;}
.ww{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.wr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.wl{font-size:12px;font-weight:600;}.wh{font-size:12px;color:var(--mut);}
.wdays{display:flex;gap:4px;}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.wd-l{font-size:9px;color:var(--mut);font-weight:600;}

function launchConfetti(){
  var canvas=document.getElementById('confetti-canvas');
  if(!canvas)return;
  canvas.style.display='block';
  var ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  var colors=['#E8603A','#22C55E','#EF9F27','#3B82F6','#EC4899','#F5F0E8','#A855F7','#FB923C','#34D399'];
  // Zwei Kanonen: links unten und rechts unten
  var cannons=[
    {x:canvas.width*0.25,y:canvas.height+10},
    {x:canvas.width*0.75,y:canvas.height+10}
  ];
  var pieces=[];
  cannons.forEach(function(c){
    for(var i=0;i<80;i++){
      var angle=-(Math.random()*80+50)*(Math.PI/180); // 50-130 Grad nach oben
      var speed=Math.random()*18+10;
      var w=Math.random()*8+4;
      var h=Math.random()*4+3;
      pieces.push({
        x:c.x+(Math.random()*20-10),
        y:c.y,
        vx:Math.cos(angle)*speed*(c.x<canvas.width/2?1:-1),
        vy:Math.sin(angle)*speed,
        w:w,h:h,
        color:colors[Math.floor(Math.random()*colors.length)],
        angle:Math.random()*360,
        spin:Math.random()*12-6,
        gravity:0.45,
        alive:true
      });
    }
  });
  var frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var any=false;
    pieces.forEach(function(p){
      if(!p.alive)return;
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.angle+=p.spin;
      if(p.y>canvas.height+20){p.alive=false;return;}
      any=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(frame<240&&any)requestAnimationFrame(draw);else canvas.style.display='none';
  }
  draw();
}

var breathRunning=false,breathTimer=null,breathCountTimer=null;
function startBreath(){
  var ov=document.getElementById('breath-ov');if(!ov)return;
  ov.classList.add('on');breathRunning=true;
  setTimeout(function(){runBreathPhase('in',4);},100);
}
function stopBreath(){
  var ov=document.getElementById('breath-ov');if(ov)ov.classList.remove('on');
  breathRunning=false;
  clearTimeout(breathTimer);clearInterval(breathCountTimer);
  var arc=document.getElementById('breath-arc');if(arc)arc.style.strokeDashoffset='565';
  var svg=document.getElementById('breath-svg');if(svg)svg.className='breath-svg';
}
function runBreathPhase(phase,secs){
  if(!breathRunning)return;
  var arc=document.getElementById('breath-arc');
  var svg=document.getElementById('breath-svg');
  var ph=document.getElementById('breath-phase');
  var cnt=document.getElementById('breath-count');
  var glow=document.getElementById('breath-glow');
  if(!arc||!svg)return;
  // Bogen: 0 = voll, 565 = leer
  if(phase==='in'){
    arc.style.strokeDashoffset='0';
    svg.className='breath-svg expanding';
    if(glow)glow.style.opacity='1';
    if(ph)ph.textContent='EINATMEN';
  } else if(phase==='hold'){
    arc.style.strokeDashoffset='0';
    svg.className='breath-svg holding';
    if(ph)ph.textContent='HALTEN';
  } else {
    arc.style.strokeDashoffset='565';
    svg.className='breath-svg shrinking';
    if(glow)glow.style.opacity='0';
    if(ph)ph.textContent='AUSATMEN';
  }
  var remaining=secs;
  if(cnt)cnt.textContent=remaining;
  clearInterval(breathCountTimer);
  breathCountTimer=setInterval(function(){
    remaining--;
    if(cnt)cnt.textContent=remaining>0?remaining:'';
    if(remaining<=0)clearInterval(breathCountTimer);
  },1000);
  breathTimer=setTimeout(function(){
    if(!breathRunning)return;
    if(phase==='in')runBreathPhase('hold',4);
    else if(phase==='hold')runBreathPhase('out',6);
    else runBreathPhase('in',4);
  },secs*1000);
}

var voiceActive=false;
var _voiceRec=null;
var _voiceBase='';
function toggleVoice(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('⚠️ Spracheingabe nicht unterstützt');return;}
  if(voiceActive){
    if(_voiceRec){_voiceRec.stop();_voiceRec=null;}
    voiceActive=false;render();return;
  }
  var inp=document.getElementById('kumpel-inp');
  _voiceBase=inp?inp.value:'';
  var recognition=new SR();
  _voiceRec=recognition;
  recognition.lang='de-DE';
  recognition.continuous=true;
  recognition.interimResults=true;
  voiceActive=true;render();
  recognition.onresult=function(e){
    var finalText='';var interimText='';
    for(var i=0;i<e.results.length;i++){
      if(e.results[i].isFinal){finalText+=e.results[i][0].transcript+' ';}
      else{interimText+=e.results[i][0].transcript;}
    }
    var inp=document.getElementById('kumpel-inp');
    if(inp)inp.value=_voiceBase+finalText+interimText;
    if(finalText)_voiceBase=_voiceBase+finalText;
  };
  recognition.onend=function(){
    // auf iOS bricht continuous manchmal ab — neu starten solange aktiv
    if(voiceActive&&_voiceRec){try{recognition.start();}catch(e){voiceActive=false;render();}}
    else{voiceActive=false;render();}
  };
  recognition.onerror=function(e){
    if(e.error==='no-speech')return; // kurze Pause — kein Fehler
    voiceActive=false;_voiceRec=null;toast('⚠️ Mikrofon Fehler: '+e.error);render();
  };
  recognition.start();
}

function askClaude(prompt,onDone){

    method:'POST',
    headers:{'Content-Type':'application/json'},

  .then(function(d){

    var raw=d.content&&d.content[0]?d.content[0].text:(errMsg?'⚠️ '+errMsg:'Keine Antwort erhalten.');

function updT(id,p){
  var was=tasks.find(function(t){return t.id===id;});
  tasks=tasks.map(function(t){return t.id===id?Object.assign({},t,p):t;});
  sl();scheduleSync();
  if(p.status==='erledigt'&&(!was||was.status!=='erledigt'))launchConfetti();

  if(p.assignees&&p.assignees.length>0&&(!was||!was.ersterSchritt)){

// ── WEEK ──────────────────────────────────────────────────────
function weekWorkload(){
  var now=new Date();
  var day=now.getDay();
  var monday=new Date(now);monday.setDate(now.getDate()-(day===0?6:day-1));
  var days=[0,0,0,0,0,0,0];
  tasks.forEach(function(t){
    (t.slots||[]).forEach(function(s){
      if(!s.ds)return;
      var d=new Date(s.ds);
      var diff=Math.floor((d-monday)/(1000*60*60*24));
      if(diff>=0&&diff<7)days[diff]+=t.min;
    });
  });
  return days;
}

function pinKey(k){
  if(k==='')return;
  if(k==='⌫'){pinIn=pinIn.slice(0,-1);pinErr='';renderPin();return;}
  if(pinIn.length>=4)return;
  pinIn+=k;renderPin();
  if(pinIn.length===4){
    setTimeout(function(){
      var saved=lp();
      if(pinMode==='unlock'){
        if(!saved||pinIn===saved){unlock();}
        else{pinErr='Falscher PIN';pinIn='';renderPin();}
      } else if(pinMode==='set'){
        pinFirst=pinIn;pinIn='';pinMode='confirm';renderPin();
      } else if(pinMode==='confirm'){
        if(pinIn===pinFirst){sp(pinIn);toast('✅ PIN gespeichert');unlock();}
        else{pinErr='PINs stimmen nicht überein';pinIn='';pinFirst='';pinMode='set';renderPin();}
      }
    },200);
  }
}

// ── AUFGABEN ──────────────────────────────────────────────────
function rAufgaben(){
  var biz=seg;
  var all=tasks.filter(function(t){return t.biz===biz;});
  var f=all.slice();
  f.sort(function(a,b){
    var pa=a.cat==='Rechnungen & Angebote'?0:1;
    var pb=b.cat==='Rechnungen & Angebote'?0:1;
    if(pa!==pb)return pa-pb;
    return ST.indexOf(a.status)-ST.indexOf(b.status);
  });
  if(fst!=='alle')f=f.filter(function(t){return t.status===fst;});
  if(fca!=='alle')f=f.filter(function(t){return t.cat===fca;});
  if(sq)f=f.filter(function(t){return t.text.toLowerCase().includes(sq.toLowerCase());});
  var cnt={alle:all.length};ST.forEach(function(s){cnt[s]=all.filter(function(t){return t.status===s;}).length;});
  var cats=biz==='s'?CATS_S:CATS_SS;

  var projs={};var standalone=[];
  f.forEach(function(t){
    if(t.project){if(!projs[t.project])projs[t.project]=[];projs[t.project].push(t);}
    else standalone.push(t);
  });

  var html='<div class="seg">'
    +'<button class="seg-b'+(seg==='s'?' on':'')+'" onclick="seg=\'s\';fca=\'alle\';render()">🔨 Schlosserei</button>'
    +'<button class="seg-b'+(seg==='a'?' on':'')+'" onclick="seg=\'a\';fca=\'alle\';render()">⚒️ Stahl & Seele</button>'
    +'</div>'
    +'<div class="qa"><input id="qa-in" type="text" placeholder="Schnell hinzufügen…" onkeydown="if(event.key===\'Enter\')quickAdd()"><button onclick="quickAdd()">＋</button></div>'
    +'<div class="sw"><span class="si">🔍</span><input type="search" placeholder="Suchen…" value="'+sq+'" oninput="sq=this.value;render()" style="padding-left:38px"></div>'
    +'<div class="fscr">'+['alle'].concat(ST).map(function(s){return '<div class="fc'+(fst===s?' on':'')+'" onclick="fst=\''+s+'\';render()">'+(s==='alle'?'Alle':SL[s])+' ('+(cnt[s]||0)+')</div>';}).join('')+'</div>'
    +'<div class="fscr"><div class="fc'+(fca==='alle'?' on':'')+'" onclick="fca=\'alle\';render()">Alle</div>'
    +cats.map(function(c){return '<div class="fc'+(fca===c?' on':'')+'" onclick="fca=\''+c+'\';render()">'+c+'</div>';}).join('')+'</div>';

  if(biz==='a'&&all.length===0){
    html+='<div class="empty"><div style="font-size:36px;margin-bottom:8px">⚒️</div><div style="font-weight:600;margin-bottom:6px">Stahl & Seele</div><div style="font-size:13px">Noch keine Aufgaben. Über ＋ hinzufügen oder aus Notion laden.</div>'
      +'<button onclick="pullFromStahlSeele()" style="margin-top:12px;padding:10px 18px;border-radius:10px;background:var(--rust);color:white;border:none;font-weight:600;cursor:pointer">📥 Von Notion laden</button></div>';
  }

  Object.keys(projs).forEach(function(name){
    var pt=projs[name];
    var done=pt.filter(function(t){return t.status==='erledigt';}).length;
    html+='<div class="pj-box">'
      +'<div class="pj-hd">📋 Projekt: '+name+' – '+done+'/'+pt.length+' Schritte</div>'
      +'<div class="pj-flow">'+PROJ_FLOW+'</div>'
      +pt.map(trow).join('')
      +'</div>';
  });

  if(standalone.length)html+='<div class="card">'+standalone.map(trow).join('')+'</div>';
  if(f.length===0)html+='<div class="empty"><div style="font-size:36px;margin-bottom:8px">✅</div><div>Keine Aufgaben</div></div>';
  return html;
}

function textToBullets(txt){
  // Zeilen splitten, leere raus, mit • prefixen
  var lines=txt.split(/\n+/).map(function(l){return l.replace(/^[-•*]\s*/,'').trim();}).filter(function(l){return l.length>0;});
  if(lines.length<=1){
    // Einzelner Text: nach Satzzeichen splitten
    lines=txt.split(/(?<=[.!?])\s+/).map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  }
  return lines.map(function(l){return '• '+l;}).join('\n');
}

function sync3TasksToNotion(){
  if(!getRalfToken()){toast('⚠️ Kein Notion-Token! → Einstellungen → Ralfs Notion-Token eintragen');return;}
  // Top 3: erst Ralf-zugewiesene, sonst allgemein offene
  var top3=tasks.filter(function(t){return t.status!=='erledigt'&&(t.assignees||[]).includes('ralf');}).slice(0,3);
  if(top3.length<3){
    // Nur nicht-zugewiesene Aufgaben auffüllen — NICHT Julies oder andere Personen
    var rest=tasks.filter(function(t){return t.status!=='erledigt'&&(t.assignees||[]).length===0;});
    top3=top3.concat(rest).slice(0,3);
  }
  if(top3.length===0){toast('ℹ️ Keine offenen Aufgaben vorhanden');return;}
  toast('⏳ Schreibe 3 Aufgaben nach Notion…');
  // Wenn blockIds bekannt → bestehende Blöcke updaten
  if(ss3Tasks.length>0&&ss3Tasks[0].blockId){
    var done=0,total=Math.min(top3.length,ss3Tasks.length);
    for(var i=0;i<total;i++){
      (function(idx){
        notionAPI('blocks/'+ss3Tasks[idx].blockId,'PATCH',{
          to_do:{rich_text:[{type:'text',text:{content:top3[idx].text}}],checked:false}
        },function(){done++;if(done===total){toast('✅ 3 Aufgaben in Notion aktualisiert');load3Tasks();}},getRalfToken());
      })(i);
    }
  } else {
    // Erst laden um blockIds zu holen, dann updaten
    notionAPI('blocks/'+SS_3TASKS+'/children','GET',null,function(data){
      var blocks=(data&&data.results||[]).filter(function(b){return b.type==='to_do';}).slice(0,3);
      if(blocks.length>0){
        var done2=0,total2=Math.min(top3.length,blocks.length);
        for(var j=0;j<total2;j++){
          (function(jdx){
            notionAPI('blocks/'+blocks[jdx].id,'PATCH',{
              to_do:{rich_text:[{type:'text',text:{content:top3[jdx].text}}],checked:false}
            },function(){done2++;if(done2===total2){toast('✅ 3 Aufgaben in Notion aktualisiert');load3Tasks();}},getRalfToken());
          })(j);
        }
      } else {
        // Keine Blöcke vorhanden → neu anlegen
        var children=top3.map(function(t){return {object:'block',type:'to_do',to_do:{rich_text:[{type:'text',text:{content:t.text}}],checked:false}};});
        notionAPI('blocks/'+SS_3TASKS+'/children','PATCH',{children:children},function(d){
          if(d&&d.results){toast('✅ 3 Aufgaben in Notion eingetragen');load3Tasks();}
          else{toast('⚠️ Notion Fehler: '+(d&&d.message||'Unbekannt'));}
        },getRalfToken());
      }
    },getRalfToken());
  }
}

function load3Tasks(){
  toast('⏳ Lade heutige Aufgaben…');
  notionAPI('blocks/'+SS_3TASKS+'/children','GET',null,function(data){
    if(!data){toast('⚠️ Netzwerkfehler – Notion nicht erreichbar');return;}
    if(data.code||data.object==='error'){toast('⚠️ Notion: '+(data.message||data.code||'Fehler'));return;}
    if(!data.results){toast('⚠️ Konnte Aufgaben nicht laden');return;}
    var parsed=data.results
      .filter(function(b){return b.type==='to_do'||b.type==='bulleted_list_item'||b.type==='numbered_list_item';})
      .slice(0,3)
      .map(function(b){
        var text=(b[b.type]&&b[b.type].rich_text||[]).map(function(t){return t.plain_text;}).join('');
        var done=b.type==='to_do'?(b.to_do.checked||false):false;
        return {aufgabe:text,fertig:done,blockId:b.id,ersterSchritt:''};
      });
    if(parsed.length===0){toast('⚠️ Keine Aufgaben in der Notion-Seite gefunden');return;}
    // Ersten Schritt für jede Aufgabe nachladen
    var remaining=parsed.length;
    parsed.forEach(function(task,i){
      notionAPI('blocks/'+task.blockId+'/children','GET',null,function(child){
        if(child&&child.results&&child.results.length>0){
          var c=child.results[0];var ct=c.type;
          parsed[i].ersterSchritt=(c[ct]&&c[ct].rich_text||[]).map(function(t){return t.plain_text;}).join('');
        }
        remaining--;
        if(remaining===0){
          ss3Tasks=parsed;
          ss3TasksDate=today();
          localStorage.setItem('ew_v2:3tasks',JSON.stringify(ss3Tasks));
          localStorage.setItem('ew_v2:3tasks_date',ss3TasksDate);
          toast('✅ '+parsed.length+' Aufgaben geladen');
          render();
        }
      },getRalfToken());
    });
  },getRalfToken());
}

function toggle3Task(idx){
  if(!ss3Tasks[idx])return;
  ss3Tasks[idx].fertig=!ss3Tasks[idx].fertig;
  localStorage.setItem('ew_v2:3tasks',JSON.stringify(ss3Tasks));

    launchConfetti();
    if(ss3Tasks.every(function(t){return t.fertig;})){toast('🎉 Alle 3 erledigt! 🔥');}
    else{toast('✅ Erledigt!');}
  }
  render();
}

function getTeamDB(cb){
  var dbId=localStorage.getItem(LK+':teamdb');
  if(dbId){cb(dbId);return;}
  toast('⚙️ Erstelle Team-Datenbank in Notion…');
  notionAPI('databases','POST',{
    parent:{type:'page_id',page_id:SS_3TASKS},
    title:[{type:'text',text:{content:'Team Aufgaben Eigenwerk'}}],
    properties:{
      'Aufgabe':{title:{}},
      'Zugewiesen':{select:{options:[
        {name:'Philipp',color:'green'},{name:'Julie',color:'pink'},
        {name:'Lucia',color:'purple'},{name:'Lieferant',color:'orange'},{name:'Ralf',color:'blue'}
      ]}},
      'Status':{select:{options:[{name:'Offen',color:'default'},{name:'Erledigt',color:'green'}]}},
      'Erster Schritt':{rich_text:{}},
      'Erstellt':{date:{}}
    }
  },function(d){
    if(d&&d.id){localStorage.setItem(LK+':teamdb',d.id);toast('✅ Team-Datenbank erstellt!');cb(d.id);}
    else{toast('⚠️ Team-DB Fehler: '+(d&&d.message||'unbekannt'));cb(null);}
  },getRalfToken());
}

function writeToTeamDB(personId,text,ersterSchritt){
  var person=AS.find(function(a){return a.id===personId;});
  if(!person)return;
  getTeamDB(function(dbId){
    if(!dbId)return;
    notionAPI('pages','POST',{
      parent:{database_id:dbId},
      properties:{
        'Aufgabe':{title:[{type:'text',text:{content:text}}]},
        'Zugewiesen':{select:{name:person.l}},
        'Status':{select:{name:'Offen'}},
        'Erster Schritt':{rich_text:[{type:'text',text:{content:ersterSchritt||''}}]},
        'Erstellt':{date:{start:today()}}
      }
    },function(d){
      if(d&&d.id)toast('📨 Aufgabe an '+person.l+' übermittelt');
    },getRalfToken());
  });
}

function loadMyTeamTasks(){
  var dbId=localStorage.getItem(LK+':teamdb');
  if(!dbId){toast('⚠️ Noch keine Aufgaben – Ralf muss zuerst eine Aufgabe zuweisen');return;}
  var person=AS.find(function(a){return a.id===myIdentity;});
  if(!person)return;
  toast('⏳ Lade meine Aufgaben…');
  notionAPI('databases/'+dbId+'/query','POST',{
    filter:{and:[{property:'Zugewiesen',select:{equals:person.l}},{property:'Status',select:{equals:'Offen'}}]},
    sorts:[{property:'Erstellt',direction:'ascending'}]
  },function(data){
    if(!data||!data.results){toast('⚠️ Konnte Aufgaben nicht laden');return;}
    teamTasksList=data.results.map(function(p){
      var tArr=p.properties['Aufgabe']&&p.properties['Aufgabe'].title||[];
      var esArr=p.properties['Erster Schritt']&&p.properties['Erster Schritt'].rich_text||[];
      return {pageId:p.id,text:tArr.map(function(t){return t.plain_text;}).join(''),ersterSchritt:esArr.map(function(t){return t.plain_text;}).join(''),fertig:false};
    });
    localStorage.setItem(LK+':teamtasks',JSON.stringify(teamTasksList));
    toast('✅ '+teamTasksList.length+' Aufgabe(n) für dich');
    render();
  },getRalfToken());
}

function completeMyTeamTask(pageId,idx){
  teamTasksList[idx].fertig=true;
  localStorage.setItem(LK+':teamtasks',JSON.stringify(teamTasksList));
  launchConfetti();toast('🎉 Erledigt!');render();
  notionAPI('pages/'+pageId,'PATCH',{properties:{'Status':{select:{name:'Erledigt'}}}},function(){},getRalfToken());
}

function setMyIdentity(id){
  myIdentity=id;
  localStorage.setItem(LK+':ich',id);
  teamTasksList=[];localStorage.setItem(LK+':teamtasks','[]');
  render();
  if(id&&id!=='ralf'){setTimeout(loadMyTeamTasks,300);}
}

// ── DIREKTE NOTION API (über Netlify Proxy) ───────────────────
function notionAPI(path, method, body, cb, forceToken){
  var token=forceToken||getRalfToken()||getNotionToken();
  fetch('/.netlify/functions/notion', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({path:path, method:method||'GET', body:body||null, token:token})
  })
  .then(function(r){return r.json();})
  .then(function(d){cb(d);})
  .catch(function(e){cb(null,e.message);});
}

function notionQueryDB(dbId, cb){
  notionAPI('databases/'+dbId+'/query','POST',{page_size:50},cb,tokenForDB(dbId));
}

function notionCreatePage(dbId, props, cb){
  notionAPI('pages','POST',{parent:{database_id:dbId},properties:props},cb);
}

function pushTaskToNotion(task){
  // Token und DB je nach Bereich wählen
  var token=task.biz==='a'?getNotionToken():getRalfToken();
  if(!token){toast('ℹ️ Notion-Token fehlt – in Einstellungen eintragen');return;}
  var dbId=task.biz==='a'?SSDBID:NDBID;
  var assigneeNames=(task.assignees||[]).map(function(id){
    var p=AS.find(function(x){return x.id===id;});
    return p?p.l:id;
  }).join(', ');
  var props={
    'Name':{title:[{text:{content:task.text}}]},
    'Status':{select:{name:task.status||'offen'}},
    'Zugewiesen':{rich_text:[{text:{content:assigneeNames}}]},
    'Kategorie':{rich_text:[{text:{content:task.cat||''}}]}
  };
  notionAPI('pages','POST',{parent:{database_id:dbId},properties:props},function(d){
    if(d&&d.id){toast('📋 In Notion: '+(assigneeNames||task.text));}
    else if(d&&d.object==='error'){toast('⚠️ Notion: '+d.message);}
  },token);
}

function loadSSAnmeldungen(){
  if(!getNotionToken()){toast('⚠️ Kein Stahl & Seele Token → Einstellungen → "Notion Token — Siljas Workspace"');return;}
  toast('⏳ Lade neue Anmeldungen…');
  notionQueryDB(SS_ANMELDUNGEN, function(data){
    if(!data){toast('⚠️ Keine Antwort von Notion');return;}
    if(data.object==='error'){toast('⚠️ Notion: '+data.message);return;}
    if(!data.results){toast('⚠️ Anmeldungen konnten nicht geladen werden');return;}
    var known=JSON.parse(localStorage.getItem('ew_v2:ss_known')||'[]');
    var parsed=data.results.map(function(p){
      var props=p.properties||{};
      var getName=function(prop){return prop&&prop.title?prop.title.map(function(t){return t.plain_text;}).join(''):(prop&&prop.rich_text?prop.rich_text.map(function(t){return t.plain_text;}).join(''):prop&&prop.select?prop.select.name:prop&&prop.email?prop.email:'');};
      return {
        id:p.id,
        name:getName(props['Name']||props['Teilnehmer']||props['Kunde']||Object.values(props)[0]),
        produkt:getName(props['Produkt']||props['Kurs']||props['Buchung']||{}),
        email:getName(props['E-Mail']||props['Email']||{}),
        datum:p.created_time?p.created_time.slice(0,10):''
      };
    });
    var newOnes=parsed.filter(function(a){return !known.includes(a.id);});
    newOnes.forEach(function(a){
      var prod=SS_PRODUKTE.find(function(p){return a.produkt&&a.produkt.toLowerCase().includes(p.name.toLowerCase().split(' ')[0].toLowerCase());})||{emoji:'📋'};
      addT({text:prod.emoji+' Neuer Kurs: '+a.name+' → '+(a.produkt||'unbekannt'),min:15,cat:'Kurs-Entwicklung',biz:'a',status:'offen',assignees:['ralf']});
    });
    ssAnmeldungen=parsed;
    var newKnown=parsed.map(function(a){return a.id;});
    localStorage.setItem('ew_v2:ss_known',JSON.stringify(newKnown));
    localStorage.setItem('ew_v2:ss_check',new Date().toLocaleString('de-DE'));
    ssLastCheck=localStorage.getItem('ew_v2:ss_check');
    if(newOnes.length>0){toast('🆕 '+newOnes.length+' neue Anmeldung(en)!');launchConfetti();}
    else toast('✅ Keine neuen Anmeldungen');
    render();
  });
}

function loadSSBestand(){
  toast('⏳ Prüfe Material-Bestand…');
  notionQueryDB(SS_BESTAND, function(data){
    if(!data||!data.results){toast('⚠️ Bestand konnte nicht geladen werden');return;}
    var parsed=data.results.map(function(p){
      var props=p.properties||{};
      var keys=Object.keys(props);
      var name=(props['Name']||props['Set']||props['Material']||{});
      var nameStr=name.title?name.title.map(function(t){return t.plain_text;}).join(''):'Unbekannt';
      var bestand=(props['Bestand']||props['Anzahl']||props['Menge']||{}).number||0;
      var status=bestand<=0?'leer':bestand<=2?'warn':'ok';
      return {name:nameStr,bestand:bestand,status:status};
    });
    ssAlerts=parsed.filter(function(s){return s.status==='warn'||s.status==='leer';});
    ssAlerts.forEach(function(s){
      var exists=tasks.find(function(t){return t.text.includes(s.name)&&t.text.includes('Material');});
      if(!exists) addT({text:(s.status==='leer'?'❌':'⚠️')+' Material '+(s.status==='leer'?'fehlt':'niedrig')+': '+s.name,min:20,cat:'Kurs-Entwicklung',biz:'a',status:'offen',assignees:['ralf']});
    });
    if(ssAlerts.length>0)toast('⚠️ '+ssAlerts.length+' Material-Problem(e)!');
    else toast('✅ Bestand in Ordnung');
    render();
  });
}


function pullFromStahlSeele(){
  if(!getNotionToken()){toast('⚠️ Kein Stahl & Seele Token → Einstellungen → "Notion Token — Siljas Workspace"');return;}
  toast('⏳ Lade Stahl & Seele von Notion…');
  notionQueryDB(SSDBID,function(data){
    if(!data){toast('⚠️ Keine Antwort von Notion');return;}
    if(data.object==='error'){toast('⚠️ Notion: '+data.message);return;}
    if(!data.results){toast('⚠️ Fehler beim Laden');return;}
    var added=0;
    data.results.forEach(function(p){
      var props=p.properties||{};
      var nameProp=props['Name']||props['Aufgabe']||props['Titel']||Object.values(props).find(function(v){return v.type==='title';});
      var text=nameProp&&nameProp.title?nameProp.title.map(function(t){return t.plain_text;}).join(''):null;
      if(!text)return;
      if(tasks.find(function(t){return t.text===text;}))return;
      var statusProp=props['Status']||{};
      var status=statusProp.select?statusProp.select.name:(statusProp.status?statusProp.status.name:'offen');
      var catProp=props['Kategorie']||props['Bereich']||{};
      var cat=catProp.rich_text?catProp.rich_text.map(function(t){return t.plain_text;}).join(''):catProp.select?catProp.select.name:'Kurs-Entwicklung';
      tasks.push({id:uid(),text:text,status:status||'offen',cat:cat,biz:'a',assignees:[],slots:[],min:25});
      added++;
    });
    sl();render();
    toast(added>0?'✅ '+added+' Aufgaben geladen':'ℹ️ Keine neuen Aufgaben');
  });
}

function quickSaveToNotion(){
  var inp=document.getElementById('kumpel-inp');
  var t=(kumpelInputText||'').trim()||(inp&&inp.value)||'';t=t.trim();
  if(!t){toast('⚠️ Zuerst etwas eintippen');return;}
  var token=getRalfToken();
  if(!token){toast('⚠️ Kein Schlosserei-Token – in Einstellungen eintragen');return;}
  toast('⏳ Wird zu Notion gespeichert…');
  var props={'Name':{title:[{text:{content:t}}]},'Status':{select:{name:'offen'}}};
  notionAPI('pages','POST',{parent:{database_id:NDBID},properties:props},function(d){
    if(d&&d.id){
      if(inp)inp.value='';
      kumpelInputText='';
      toast('✅ In Notion gespeichert!');
    } else {
      toast('⚠️ Notion-Fehler – lokal gespeichert');
      addKumpelNote();
    }
  },token);
}

  var _m=String(_n.getMinutes()).padStart(2,'0');
  var _days=['So','Mo','Di','Mi','Do','Fr','Sa'];
  var _months=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  var clockHtml='<div style="text-align:right;line-height:1.2;cursor:default">'
    +'<div style="font-size:17px;font-weight:700;color:var(--cream);letter-spacing:.04em">'+_h+':'+_m+'</div>'
    +'<div style="font-size:10px;color:var(--mut);letter-spacing:.03em">'+_days[_n.getDay()]+', '+_n.getDate()+'. '+_months[_n.getMonth()]+'</div>'
    +'</div>';
  var right=clockHtml+'<button class="hdr-b" id="sync-badge" onclick="sync3TasksToNotion()" title="Top 3 → Notion" style="margin-left:8px">⬆️</button>';
  var sheetHtml='';
  if(sheet==='detail')sheetHtml=rDetail();
  else if(sheet==='add'||sheet==='edit')sheetHtml=rAdd();
  var body=sc==='heute'?rHeute():sc==='aufgaben'?rAufgaben():sc==='kumpel'?rKumpel():sc==='team'?rTeam():rSettings();
  var navHtml=NAV.map(function(i){return '<button class="ni'+(sc===i.id?' on':'')+'" onclick="sc=\''+i.id+'\';render()"><span class="ni-i">'+i.icon+'</span><span class="ni-l">'+i.l+'</span></button>';}).join('');
  el.innerHTML='<div class="hdr"><div class="hdr-t">'+titles[sc]+'</div>'+right+'</div>'
    +'<div class="content">'+body+'</div>'
    +'<nav class="nav">'+navHtml+'</nav>'

    el.appendChild(fab);
  }
  updateSyncBadge();
}

  var saved=ll();
  if(saved){tasks=saved;}
  else{tasks=DEFAULT_S.concat(DEFAULT_A).map(function(t){var s=t.status||(t.assignees&&t.assignees.length>0?'zugewiesen':'offen');return Object.assign({},t,{slots:[],status:s});});sl();}
  llp();
  var pin=lp();
  if(!pin){pinLocked=false;document.getElementById('pin-scr').style.display='none';document.getElementById('app').style.display='flex';render();}
  else{pinMode='unlock';pinIn='';pinErr='';renderPin();}
}
